<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Fazendinha do Miguel 🎂</title>

    <!-- Redireciona após 3 segundos -->
    <meta http-equiv="refresh" content="3; url=https://www.instagram.com/s/aGlnaGxpZ2h0OjE3OTMwNDAzMDY2MjMxMjkw?story_media_id=3872267678799487908&igsh=ZWRudDJlZmxtbzlq">

    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            
            background: 
                    linear-gradient(rgba(168, 230, 255, 0.5), rgba(232, 248, 255, 0.5)),
                            url('minguel1ano.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            background-attachment: fixed;
            
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .card {
            background: #ffffff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            max-width: 350px;
        }

        h1 {
            color: #4CAF50;
            margin-bottom: 10px;
        }

        h2 {
            color: #ff7043;
            margin-top: 0;
        }

        p {
            color: #555;
            font-size: 16px;
        }

        .emoji {
            font-size: 28px;
        }

        .contador {
            font-weight: bold;
            color: #ff7043;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="emoji">🐄🐖🐔🌽</div>

    <h1>Fazendinha do Miguel</h1>
    <h2>1 aninho 🎂</h2>

    <p>Não vá embora sem antes tirar uma foto com a gente! 💛</p>

    <p>Redirecionando em <span class="contador" id="count">3</span> segundos ⏳</p>
</div>

<script>
    let tempo = 3;
    const contador = document.getElementById("count");

    setInterval(() => {
        tempo--;
        if (tempo >= 0) {
            contador.innerText = tempo;
        }
    }, 1000);
</script>

</body>
</html>
